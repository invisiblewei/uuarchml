<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>uuarckml - 芯片架构设计可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    
    .header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #60a5fa;
    }
    
    .header .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-left: 12px;
    }
    
    .main {
      display: flex;
      height: calc(100vh - 65px);
    }
    
    .sidebar {
      width: 320px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
    }
    
    .panel {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }
    
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    textarea {
      width: 100%;
      min-height: 200px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 12px;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
    }
    
    textarea:focus {
      outline: none;
      border-color: #60a5fa;
    }
    
    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: #2563eb;
    }
    
    .btn-secondary {
      background: #475569;
    }
    
    .btn-secondary:hover {
      background: #334155;
    }
    
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #334155;
    }
    
    .canvas-container {
      flex: 1;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    
    .canvas {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .ai-panel {
      border-top: 1px solid #334155;
      padding: 16px;
    }
    
    .ai-input {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    
    .ai-input input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
    }
    
    .ai-input input:focus {
      outline: none;
      border-color: #a78bfa;
    }
    
    .examples {
      margin-top: 16px;
    }
    
    .example-item {
      padding: 8px 12px;
      background: #334155;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .example-item:hover {
      background: #475569;
    }
    
    .error {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <span style="display: flex; align-items: center;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <h1 style="margin-left: 8px;">uuarckml</h1>
        <span class="subtitle">芯片架构设计可视化</span>
      </span>
    </div>
    <div style="font-size: 12px; color: #64748b;">
      RTL 代码撰写前的 AI 与人对齐工具
    </div>
  </div>
  
  <div class="main">
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Chip DSL</div>
        <textarea id="dsl-input" placeholder="输入芯片架构描述...

示例：
chip cpu {
  module fetch {
    input pc: addr_t
    output instr: data_t
  }
  module decode {
    input instr: data_t
    output ctrl: control_t
  }
  datapath fetch -> decode
}">chip cpu {
  module fetch {
    input pc: addr_t
    input clk: clk
    output instr: data_t
    output pc_next: addr_t
  }
  
  module decode {
    input instr: data_t
    output rs1_addr: addr_t
    output rs2_addr: addr_t
    output alu_op: control_t
  }
  
  module execute {
    input rs1_data: data_t
    input rs2_data: data_t
    input alu_op: control_t
    output result: data_t
  }
  
  datapath pipeline fetch -> decode -> execute
}</textarea>
        <div id="error-msg" class="error"></div>
        
        <div class="examples">
          <div class="panel-title">快速示例</div>
          <div class="example-item" data-example="riscv">RISC-V 五级流水线 CPU</div>
          <div class="example-item" data-example="fifo">异步 FIFO</div>
          <div class="example-item" data-example="axi">AXI 总线接口</div>
        </div>
      </div>
      
      <div class="ai-panel">
        <div class="panel-title">AI 助手</div>
        <div class="ai-input">
          <input type="text" id="ai-prompt" placeholder="描述你的芯片设计需求...">
          <button class="btn" id="ai-generate">生成</button>
        </div>
      </div>
      
      <div class="toolbar">
        <button class="btn" id="btn-render">渲染</button>
        <button class="btn btn-secondary" id="btn-rtl">导出 RTL</button>
      </div>
    </div>
    
    <div class="canvas-container">
      <div id="canvas" class="canvas"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
